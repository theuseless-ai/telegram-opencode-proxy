# Example config for telegram-opencode-proxy. Copy to config.toml and edit.
# See docs/design/architecture.md §11.

# Leave empty and provide the token via the TELOXIDE_TOKEN env var (recommended;
# never commit a real token). If set here, TELOXIDE_TOKEN still overrides it.
bot_token = ""

# Local-only admin control socket (CLI ↔ daemon) for `proxy status|connect|pair`.
# The daemon creates the parent dir and locks the socket to 0600. Use a writable
# path — e.g. $XDG_RUNTIME_DIR/topx/admin.sock in production; /tmp is fine for dev.
admin_socket = "/tmp/topx-admin.sock"

# SQLite store for routing (chat_id → opencode session), the whitelist, and
# pending pairings/approvals. Survives restarts. Relative paths resolve against
# the working directory; WAL creates proxy.db-wal / proxy.db-shm alongside it.
# Optional — defaults to "proxy.db".
db_path = "proxy.db"

# One "seat" per user. opencode_url must be distinct per slot; workdir must exist.
#
# workdir is this slot's opencode working directory. Outbound files (the ./outbox
# watcher) and /get read it by LOCAL PATH, so the proxy and this slot's opencode
# must share a filesystem: run them on the same host, or bind-mount workdir to the
# very directory opencode reads/writes. (The prompt/stream path is HTTP and works
# with a remote opencode; the disk-based file conventions do not.)
#
# telegram_id is the TEMPORARY minimal auth gate (A4a): set it to your numeric
# Telegram id to whitelist yourself for this slot. Find your id by texting the
# running bot `/whoami`. This is a bootstrap stand-in — A4b pairing (proxy pair
# approve) will bind ids in the database instead, and this line goes away.
[[slots]]
name = "you"
opencode_url = "http://127.0.0.1:4096"
workdir = "/home/you/work/you"
# telegram_id = 123456789

[[slots]]
name = "wife"
opencode_url = "http://127.0.0.1:4097"
workdir = "/home/you/work/wife"
# telegram_id = 987654321

# Model SELECTOR only — the endpoint URL + key live in opencode.json (§12).
# OPTIONAL (#74): omit the whole [model] section to use opencode's own default
# model (its `/config/providers` default). Set it only to pin a specific
# provider/model, or when opencode has several provider defaults (then it's
# required to disambiguate). When present, both ids must match opencode.json.
[model]
provider_id = "llm-lan"
model_id = "Qwen3.6-35B-A3B-bf16"
# Context-window size (tokens), used to show a context-usage % in the reply
# footer (#72), e.g. `🧠 42%`. opencode reports no limit for locally hosted /
# non-models.dev models, so set it here to get a percentage; when omitted the
# footer falls back to a raw token count (e.g. `🧠 12.3k ctx`).
# context_window = 32768

# Bash patterns gated per session. Held at `deny` until the permission relay
# (#13) exists to answer prompts, then flipped to `ask`.
[permissions]
ask = ["git commit*", "git push*"]

# Enrolment / pairing (A4b). When an unknown sender messages the bot it is issued
# a single-use 6-digit confirmation code, valid for `code_ttl_secs`. The user
# reads the code back to the admin, who binds it with
# `proxy pair approve <code> --slot <name>`. Optional — defaults to 600 (10 min).
[pairing]
code_ttl_secs = 600

# MCP file-transfer server (#65): one stateless Streamable-HTTP MCP endpoint
# shared by every slot, giving opencode two tools — send_file_to_user and
# fetch_user_file — instead of a filesystem convention. Each slot's
# opencode.json points at the SAME url below and tags its requests with its
# own slot via a config-set "X-Slot" header (never set by the model, so it
# can't be spoofed). No auth beyond the loopback bind — do not widen `bind`
# without adding one. Optional — a missing [mcp] block uses these defaults.
[mcp]
# Start the MCP server task at all. Set false to run without file-transfer
# tools (e.g. #12's legacy disk-outbox only).
enabled = true
# Bind address for the MCP HTTP listener. 127.0.0.1 IS the trust boundary.
bind = "127.0.0.1"
# Bind port for the MCP HTTP listener.
port = 4100
# Maximum size, in bytes, of a single file transferred through the MCP tools.
# Defaults to 20 MiB, mirroring the inbound Telegram file cap.
max_file_bytes = 20971520
# How long, in seconds, an inbound file stays fetchable via fetch_user_file
# after being announced to the model before it is purged from the store.
ttl_secs = 300
# When true, an inbound file is ALSO attached as a base64 FilePart (#11)
# alongside the MCP announcement, for models/tooling that skip fetch_user_file.
filepart_fallback = false
