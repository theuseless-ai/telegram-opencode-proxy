# Example config for telegram-opencode-proxy. Copy to config.toml and edit.
# See docs/design/architecture.md §11.

# Leave empty and provide the token via the TELOXIDE_TOKEN env var (recommended;
# never commit a real token). If set here, TELOXIDE_TOKEN still overrides it.
bot_token = ""

# Local-only admin control socket (CLI ↔ daemon) for `proxy status|connect|pair`.
# The daemon creates the parent dir and locks the socket to 0600. Use a writable
# path — e.g. $XDG_RUNTIME_DIR/topx/admin.sock in production; /tmp is fine for dev.
admin_socket = "/tmp/topx-admin.sock"

# SQLite store for routing (chat_id → opencode session), the whitelist, and
# pending pairings/approvals. Survives restarts. Relative paths resolve against
# the working directory; WAL creates proxy.db-wal / proxy.db-shm alongside it.
# Optional — defaults to "proxy.db".
db_path = "proxy.db"

# One "seat" per user. opencode_url must be distinct per slot; workdir must exist.
#
# telegram_id is the TEMPORARY minimal auth gate (A4a): set it to your numeric
# Telegram id to whitelist yourself for this slot. Find your id by texting the
# running bot `/whoami`. This is a bootstrap stand-in — A4b pairing (proxy pair
# approve) will bind ids in the database instead, and this line goes away.
[[slots]]
name = "you"
opencode_url = "http://127.0.0.1:4096"
workdir = "/home/you/work/you"
# telegram_id = 123456789

[[slots]]
name = "wife"
opencode_url = "http://127.0.0.1:4097"
workdir = "/home/you/work/wife"
# telegram_id = 987654321

# Model SELECTOR only — the endpoint URL + key live in opencode.json (§12).
# These must match a provider/model configured there.
[model]
provider_id = "llm-lan"
model_id = "Qwen3.6-35B-A3B-bf16"

# Bash patterns gated per session. Held at `deny` until the permission relay
# (#13) exists to answer prompts, then flipped to `ask`.
[permissions]
ask = ["git commit*", "git push*"]

# Enrolment / pairing (A4b). When an unknown sender messages the bot it is issued
# a single-use 6-digit confirmation code, valid for `code_ttl_secs`. The user
# reads the code back to the admin, who binds it with
# `proxy pair approve <code> --slot <name>`. Optional — defaults to 600 (10 min).
[pairing]
code_ttl_secs = 600
